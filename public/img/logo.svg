<svg width="256" height="150" viewBox="0 0 256 150" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Gradients -->
        <linearGradient id="greenMetal" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#86EFAC" /> <!-- Light Green -->
            <stop offset="50%" stop-color="#22C55E" /> <!-- Green 500 -->
            <stop offset="100%" stop-color="#14532D" /> <!-- Dark Green -->
        </linearGradient>
        
        <linearGradient id="silverMetal" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#F9FAFB" /> <!-- White/Gray 50 -->
            <stop offset="40%" stop-color="#9CA3AF" /> <!-- Gray 400 -->
            <stop offset="100%" stop-color="#374151" /> <!-- Gray 700 -->
        </linearGradient>

        <!-- 3D Bevel Filter -->
        <filter id="bevel3d">
            <!-- Blur for depth -->
            <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
            <!-- Offset for shadow -->
            <feOffset in="blur" dx="2" dy="2" result="offsetBlur"/>
            <!-- Lighting for 3D effect -->
            <feSpecularLighting in="blur" surfaceScale="5" specularConstant="1" specularExponent="20" lighting-color="#ffffff" result="specOut">
                <fePointLight x="-5000" y="-10000" z="20000"/>
            </feSpecularLighting>
            <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut"/>
            <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="litPaint"/>
            <!-- Drop Shadow -->
            <feMerge>
                <feMergeNode in="offsetBlur"/>
                <feMergeNode in="litPaint"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Logo Group -->
    <g filter="url(#bevel3d)">
        <!-- Letter A -->
        <!-- Thick, geometric A shape -->
        <path d="M 10,140 L 50,10 L 90,140 L 70,140 L 63,110 L 37,110 L 30,140 Z M 50,40 L 40,90 L 60,90 Z" 
              fill="url(#greenMetal)" 
              stroke="#14532D" stroke-width="1" />
        
        <!-- Letter X -->
        <!-- Thick, geometric X shape -->
        <path d="M 120,10 L 145,10 L 165,60 L 185,10 L 210,10 L 180,80 L 210,150 L 185,150 L 165,100 L 145,150 L 120,150 L 150,80 Z" 
              fill="url(#silverMetal)" 
              stroke="#374151" stroke-width="1" />
              
        <!-- Center Accent Triangle (Dark Gray) -->
        <path d="M 105,10 L 125,10 L 115,35 Z" fill="#1F2937" opacity="0.9" />
    </g>
</svg>